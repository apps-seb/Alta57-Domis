<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PopaDelivery - MVP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        /* Diseño de la interfaz estilo Aplicación Móvil */
        :root { --primary: #FF441F; --bg: #F3F4F6; --text: #1F2937; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #E5E7EB; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 100%; max-width: 480px; height: 100vh; background: white; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header h1 { margin: 0; font-size: 1.2rem; }
        .badge { background: white; color: var(--primary); padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        
        #map { flex: 1; min-height: 40%; z-index: 1; }
        
        #panel { background: white; height: 50%; border-top-left-radius: 20px; border-top-right-radius: 20px; margin-top: -20px; z-index: 10; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); overflow-y: auto; }
        .drag-bar { width: 40px; height: 5px; background: #D1D5DB; border-radius: 5px; margin: 0 auto 15px; }
        
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-location { background: #3B82F6; color: white; margin-bottom: 15px; }
        .btn-location.active { background: #10B981; }
        .btn-primary { background: var(--primary); color: white; }
        
        .rest-list { display: flex; flex-direction: column; gap: 10px; }
        .rest-card { border: 1px solid #E5E7EB; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .rest-card:hover, .rest-card.selected { border-color: var(--primary); background: #FFF5F3; }
        .rest-info h3 { margin: 0 0 4px; font-size: 1rem; color: var(--text); }
        .rest-info p { margin: 0; font-size: 0.8rem; color: #6B7280; }
        
        .order-info { display: none; background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 10px; padding: 15px; margin-bottom: 15px; animation: fadeIn 0.3s ease-in-out; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; text-align: center; }
        .info-box { background: white; padding: 10px; border-radius: 8px; border: 1px solid #E5E7EB; }
        .info-val { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        .info-label { font-size: 0.75rem; color: #6B7280; font-weight: bold; text-transform: uppercase; }
        
        /* Ocultar texto por defecto de Leaflet Routing para mantener limpio el diseño */
        .leaflet-routing-container { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>🛵 PopaDelivery</h1>
            <span class="badge">Popayán</span>
        </header>
        
        <div id="map"></div>
        
        <div id="panel">
            <div class="drag-bar"></div>
            
            <button id="btn-location" class="btn btn-location" onclick="getLocation()">
                📍 Activar mi ubicación
            </button>
            
            <div id="order-info" class="order-info">
                <h3 style="margin: 0 0 10px; font-size: 1rem; color: #1F2937;" id="selected-rest-name">Restaurante</h3>
                <div class="info-grid">
                    <div class="info-box">
                        <div class="info-val" id="val-dist">--</div>
                        <div class="info-label">Distancia</div>
                    </div>
                    <div class="info-box">
                        <div class="info-val" id="val-time">--</div>
                        <div class="info-label">Tiempo Est.</div>
                    </div>
                </div>
                <p style="font-size: 10px; color: #6B7280; text-align: center; margin-bottom: 10px;">*El tiempo incluye ruta del domiciliario + preparación de la comida.</p>
                <button class="btn btn-primary" onclick="alert('¡Pedido confirmado! Tu domiciliario va en camino por las calles de Popayán 🛵💨')">Pedir Ahora</button>
            </div>

            <h2 style="font-size: 1.1rem; margin: 0 0 10px; color: #1F2937;">Restaurantes Locales</h2>
            <div class="rest-list" id="rest-list"></div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        // Coordenadas centrales: Parque Caldas, Popayán
        const POPAYAN = [2.4419, -76.6063];
        let map, userMarker, routingControl, userLocation;

        // Base de datos de prueba simulando restaurantes payaneses reales
        const restaurants = [
            { id: 1, name: "Empanadas de Pipián", desc: "Comida Típica - Sector Histórico", lat: 2.4430, lng: -76.6060, prep: 10 },
            { id: 2, name: "Hamburguesas Campanario", desc: "Comida Rápida - C.C. Campanario", lat: 2.4578, lng: -76.5975, prep: 15 },
            { id: 3, name: "Pizzería B. Bolívar", desc: "Pizza Artesanal - Barrio Bolívar", lat: 2.4465, lng: -76.6095, prep: 20 },
            { id: 4, name: "Asados Sena Norte", desc: "Carnes al carbón - Norte", lat: 2.4645, lng: -76.5942, prep: 15 }
        ];

        // 1. Inicializar el mapa
        function initMap() {
            map = L.map('map', {zoomControl: false}).setView(POPAYAN, 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

            const restList = document.getElementById('rest-list');
            restaurants.forEach(r => {
                // Pin del restaurante en el mapa
                L.marker([r.lat, r.lng]).addTo(map).bindPopup(`<b>${r.name}</b>`);
                
                // Tarjeta del restaurante en la lista
                const card = document.createElement('div');
                card.className = 'rest-card';
                card.id = `rest-${r.id}`;
                card.innerHTML = `
                    <div class="rest-info">
                        <h3>${r.name}</h3>
                        <p>${r.desc}</p>
                    </div>
                    <span style="font-size: 1.2rem; color: #FF441F;">➔</span>
                `;
                card.onclick = () => selectRestaurant(r);
                restList.appendChild(card);
            });
        }

        // 2. Activar ubicación del GPS del dispositivo
        function getLocation() {
            const btn = document.getElementById('btn-location');
            btn.innerHTML = '⏳ Buscando satélites GPS...';
            
            if(navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        userLocation = [pos.coords.latitude, pos.coords.longitude];
                        updateUserMarker();
                        btn.innerHTML = '✅ Ubicación Activada';
                        btn.className = 'btn btn-location active';
                    },
                    err => {
                        // Fallback si el usuario no da permisos: Lo ponemos en el Parque Caldas
                        alert("No pudimos acceder a tu GPS. Te ubicaremos en el Parque Caldas por defecto para que pruebes la App.");
                        userLocation = [2.4425, -76.6061];
                        updateUserMarker();
                        btn.innerHTML = '📍 Ubicación de Prueba';
                        btn.className = 'btn btn-location active';
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                alert("Tu navegador no soporta GPS.");
            }
        }

        function updateUserMarker() {
            if(userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker(userLocation, {
                color: 'white', fillColor: '#3B82F6', fillOpacity: 1, radius: 8, weight: 2
            }).addTo(map).bindPopup("¡Estás aquí!").openPopup();
            map.setView(userLocation, 15);
        }

        // 3. Seleccionar restaurante y calcular enrutamiento
        function selectRestaurant(rest) {
            if(!userLocation) {
                alert("🛵 ¡Hola! Primero debes activar tu ubicación para saber a dónde enviaremos el pedido.");
                return;
            }

            // Cambiar estilos visuales
            document.querySelectorAll('.rest-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`rest-${rest.id}`).classList.add('selected');

            // Mostrar el panel de cálculo
            document.getElementById('order-info').style.display = 'block';
            document.getElementById('selected-rest-name').innerText = `🛒 Pedido a: ${rest.name}`;
            document.getElementById('val-dist').innerText = "...";
            document.getElementById('val-time').innerText = "...";
            
            // Hacer scroll hacia arriba en el panel
            document.getElementById('panel').scrollTo({ top: 0, behavior: 'smooth' });

            if(routingControl) map.removeControl(routingControl);

            // API de Enrutamiento Vial (OSRM)
            routingControl = L.Routing.control({
                waypoints: [ L.latLng(rest.lat, rest.lng), L.latLng(userLocation[0], userLocation[1]) ],
                createMarker: () => null,
                lineOptions: { styles: [{color: '#FF441F', weight: 5, opacity: 0.9}] },
                show: false, addWaypoints: false, routeWhileDragging: false
            }).addTo(map);

            // Extraer y mostrar los datos matemáticos
            routingControl.on('routesfound', function(e) {
                const route = e.routes[0];
                
                // Conversión: De metros a Kilómetros
                const distKm = (route.summary.totalDistance / 1000).toFixed(2);
                
                // Conversión: Tiempo de manejo en moto (seg a min) + Tiempo de preparación del local
                const timeMin = Math.round(route.summary.totalTime / 60) + rest.prep;
                
                document.getElementById('val-dist').innerText = `${distKm} km`;
                document.getElementById('val-time').innerText = `~${timeMin} min`;
                
                // Ajustar la cámara del mapa para que se vea toda la ruta trazada
                map.fitBounds(L.latLngBounds([userLocation, [rest.lat, rest.lng]]), {padding: [40, 40]});
            });
        }

        // Iniciar al cargar
        window.onload = initMap;
    </script>
</body>
</html>
